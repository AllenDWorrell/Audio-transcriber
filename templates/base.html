<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Audio Transcriber{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app">
        {% block content %}{% endblock %}

        <footer class="app-footer">
            <nav class="footer-nav">
                <a class="icon-btn" href="{{ url_for('index') }}" data-tooltip-i18n="navHome" aria-label="Home">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6">
                        <path d="M3 11l9-8 9 8" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M5 10v10h5v-6h4v6h5V10" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </a>
                <a class="icon-btn" href="{{ url_for('about') }}" data-tooltip-i18n="navAbout" aria-label="About">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6">
                        <circle cx="12" cy="12" r="9"/>
                        <path d="M12 11v6" stroke-linecap="round"/>
                        <circle cx="12" cy="7.5" r="0.9" fill="currentColor" stroke="none"/>
                    </svg>
                </a>
                <button type="button" class="icon-btn" id="themeBtn" data-tooltip-i18n="navTheme" aria-label="Toggle dark mode">
                    <svg class="icon-sun" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6">
                        <circle cx="12" cy="12" r="4.5"/>
                        <path d="M12 2v2.5M12 19.5V22M4.2 4.2l1.8 1.8M18 18l1.8 1.8M2 12h2.5M19.5 12H22M4.2 19.8L6 18M18 6l1.8-1.8" stroke-linecap="round"/>
                    </svg>
                    <svg class="icon-moon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6">
                        <path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5z" stroke-linejoin="round"/>
                    </svg>
                </button>
                <a class="icon-btn" id="githubLink" href="https://github.com/AllenDWorrell/Audio-transcriber" target="_blank" rel="noopener" data-tooltip-i18n="navGithub" aria-label="GitHub repository">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path d="M12 2a10 10 0 0 0-3.16 19.49c.5.09.68-.22.68-.48v-1.7c-2.78.6-3.37-1.34-3.37-1.34-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.89 1.52 2.34 1.08 2.91.83.09-.65.35-1.08.63-1.33-2.22-.25-4.56-1.11-4.56-4.95 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.27.1-2.65 0 0 .84-.27 2.75 1.02a9.5 9.5 0 0 1 5 0c1.91-1.29 2.75-1.02 2.75-1.02.55 1.38.2 2.4.1 2.65.64.7 1.03 1.59 1.03 2.68 0 3.85-2.34 4.7-4.57 4.94.36.31.68.92.68 1.85v2.75c0 .27.18.58.69.48A10 10 0 0 0 12 2z"/>
                    </svg>
                </a>
                <button type="button" class="icon-btn" id="langBtn" data-tooltip-i18n="navLanguage" aria-label="Change language">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6">
                        <circle cx="12" cy="12" r="9"/>
                        <path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18" stroke-linecap="round"/>
                    </svg>
                    <span id="langCode" class="lang-code">EN</span>
                </button>
            </nav>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
