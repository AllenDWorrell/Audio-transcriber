{% extends "base.html" %}

{% block content %}
<header class="app-header">
    <h1 data-i18n="title">Audio Transcriber</h1>
    <p class="subtitle" data-i18n="subtitle">Upload audio and get a speaker-labeled transcript</p>
    <span id="statusBadge" class="badge">checking status…</span>
</header>

<main>
    <section id="dropzone" class="dropzone">
        <input type="file" id="fileInput" accept=".wav,.mp3,.m4a" hidden>
        <div class="dropzone-content">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M12 16V4m0 0L7 9m5-5l5 5" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <p><strong data-i18n="dropzoneAction">Click to choose a file</strong> <span data-i18n="dropzoneOr">or drag one here</span></p>
            <p class="hint" data-i18n="dropzoneHint">WAV, MP3, or M4A</p>
        </div>
    </section>

    <div id="fileInfo" class="file-info hidden">
        <span id="fileName"></span>
        <button id="uploadBtn" class="btn-primary" data-i18n="transcribeBtn">Transcribe</button>
    </div>

    <div id="progress" class="progress hidden">
        <div class="spinner"></div>
        <p data-i18n="progressText">Transcribing audio — this can take a few minutes…</p>
    </div>

    <div id="errorBox" class="error hidden"></div>

    <section id="results" class="results hidden">
        <div class="results-header">
            <h2 data-i18n="transcriptHeading">Transcript</h2>
            <a id="downloadLink" class="btn-secondary" download data-i18n="downloadBtn">Download .txt</a>
        </div>
        <div id="transcript" class="transcript"></div>
    </section>
</main>
{% endblock %}
